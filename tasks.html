<!DOCTYPE html>
<html lang="en" data-theme="default">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Tasks – Adaptive Life OS"/>
  <title>Tasks – Adaptive Life OS</title>

  <!-- Favicon & Meta -->
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon"/>
  <meta name="theme-color" content="#0f172a"/>

  <!-- CSS Loading Order – Critical: Do NOT change -->
  <link rel="stylesheet" href="assets/css/01-variables.css"/>
  <link rel="stylesheet" href="assets/css/02-base.css"/>
  <link rel="stylesheet" href="assets/css/03-layout.css"/>
  <link rel="stylesheet" href="assets/css/04-components.css"/>
  <link rel="stylesheet" href="assets/css/05-animations.css"/>
  <link rel="stylesheet" href="assets/css/06-responsive.css"/>
  <link rel="stylesheet" href="assets/css/07-themes.css"/>

  <style>
    /* Minimal inline critical CSS for fast paint */
    body {
      margin: 0;
      font-family: var(--bt-font-family-primary);
      background: var(--bt-color-bg-main);
      color: var(--bt-color-text-primary);
      min-height: 100vh;
    }
    .tasks-container {
      max-width: var(--bt-container-max);
      margin: 0 auto;
      padding: var(--bt-space-xl);
    }
    .tasks-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--bt-space-2xl);
    }
    .task-controls {
      display: flex;
      gap: var(--bt-space-lg);
      margin-bottom: var(--bt-space-xl);
      flex-wrap: wrap;
    }
    .task-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: var(--bt-space-lg);
      margin-bottom: var(--bt-space-2xl);
    }
    .task-card {
      background: var(--bt-color-bg-card);
      border-radius: var(--bt-radius-lg);
      padding: var(--bt-space-lg);
      border: 1px solid var(--bt-color-border);
      box-shadow: var(--bt-shadow-md);
      text-align: center;
    }
    .task-card-value {
      font-size: var(--bt-font-size-3xl);
      font-weight: var(--bt-font-weight-bold);
      margin: var(--bt-space-sm) 0;
    }
    .task-card-label {
      color: var(--bt-color-text-secondary);
    }
    .task-list {
      background: var(--bt-color-bg-card);
      border-radius: var(--bt-radius-lg);
      border: 1px solid var(--bt-color-border);
      overflow: hidden;
    }
    .task-item {
      padding: var(--bt-space-md) var(--bt-space-lg);
      border-bottom: 1px solid var(--bt-color-border);
      display: flex;
      align-items: center;
      gap: var(--bt-space-lg);
    }
    .task-item:last-child {
      border-bottom: none;
    }
    .task-checkbox {
      width: 20px;
      height: 20px;
    }
    .task-title {
      flex: 1;
      font-weight: var(--bt-font-weight-medium);
    }
    .task-priority {
      padding: var(--bt-space-xs) var(--bt-space-sm);
      border-radius: var(--bt-radius-sm);
      font-size: var(--bt-font-size-xs);
      font-weight: var(--bt-font-weight-medium);
    }
    .task-deadline {
      font-size: var(--bt-font-size-sm);
      color: var(--bt-color-text-muted);
    }
    .loading-state {
      text-align: center;
      padding: var(--bt-space-3xl);
      color: var(--bt-color-text-muted);
    }
  </style>
</head>
<body>

  <!-- Tasks Container -->
  <div class="tasks-container">

    <!-- Header -->
    <header class="tasks-header">
      <h1>Tasks Dashboard</h1>
      <div class="task-stats">
        <span>Daily Completion: <strong id="daily-completion">0/0</strong></span>
        <span>Current Streak: <strong id="current-streak">0 days</strong></span>
      </div>
    </header>

    <!-- Controls -->
    <section class="task-controls">
      <button id="create-task-btn" class="btn btn-primary">+ New Task</button>
      <input type="text" id="task-search" class="input" placeholder="Search tasks..."/>
      <select id="task-filter" class="select">
        <option value="all">All Tasks</option>
        <option value="today">Today</option>
        <option value="high-priority">High Priority</option>
        <option value="completed">Completed</option>
        <option value="overdue">Overdue</option>
      </select>
    </section>

    <!-- Summary Cards -->
    <section class="task-summary">
      <div class="task-card">
        <div class="task-card-label">Total Tasks</div>
        <div id="total-tasks" class="task-card-value">0</div>
      </div>
      <div class="task-card">
        <div class="task-card-label">Completed</div>
        <div id="completed-tasks" class="task-card-value">0</div>
      </div>
      <div class="task-card">
        <div class="task-card-label">Pending</div>
        <div id="pending-tasks" class="task-card-value">0</div>
      </div>
      <div class="task-card">
        <div class="task-card-label">Overdue</div>
        <div id="overdue-tasks" class="task-card-value">0</div>
      </div>
    </section>

    <!-- Task List -->
    <section id="task-list" class="task-list">
      <!-- Tasks populated dynamically -->
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Loading tasks...</p>
      </div>
    </section>

    <!-- Execution Timeline / Productivity Panel -->
    <section id="execution-timeline" class="analytics-section">
      <h2>Execution Timeline</h2>
      <!-- Timeline visualization could be added here -->
    </section>

  </div>

  <!-- Modal Root -->
  <div id="modal-root"></div>

  <!-- JavaScript Loading Order – Optimized for tasks page -->
  <!-- Core -->
  <script src="assets/js/core/08-storage.js"></script>
  <script src="assets/js/core/09-state.js"></script>
  <script src="assets/js/core/10-versioning.js"></script>
  <script src="assets/js/core/11-eventbus.js"></script>

  <!-- Task & Streak Engines (core for this page) -->
  <script src="assets/js/engine/17-task.engine.js"></script>
  <script src="assets/js/engine/23-streak.engine.js"></script>
  <script src="assets/js/engine/25-discipline.engine.js"></script>

  <!-- UI & Router -->
  <script src="assets/js/ui/32-router.js"></script>
  <script src="assets/js/ui/33-view.manager.js"></script>
  <script src="assets/js/ui/35-dashboard.ui.js"></script>
  <script src="assets/js/ui/36-sidebar.ui.js"></script>
  <script src="assets/js/ui/37-header.ui.js"></script>
  <script src="assets/js/ui/38-alerts.ui.js"></script>
  <script src="assets/js/ui/39-modals.ui.js"></script>

  <!-- Boot -->
  <script src="assets/js/core/43-boot.js"></script>

  <!-- Tasks-specific script -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      // Update task summary
      function updateTaskSummary() {
        const stats = TaskEngine?.getTaskStats?.() || {};
        document.getElementById("total-tasks").textContent = stats.total || 0;
        document.getElementById("completed-tasks").textContent = stats.completed || 0;
        document.getElementById("pending-tasks").textContent = stats.pending || 0;
        document.getElementById("overdue-tasks").textContent = stats.overdue || 0;
        document.getElementById("daily-completion").textContent = `${stats.completed || 0}/${stats.total || 0}`;
      }

      // Update streak display
      function updateStreakDisplay() {
        const streak = StreakEngine?.getStreakByType?.('task') || { currentStreak: 0 };
        document.getElementById("current-streak").textContent = `${streak.currentStreak || 0} days`;
      }

      // Render task list
      function renderTaskList() {
        const list = document.getElementById("task-list");
        if (!list) return;

        const tasks = TaskEngine?.getTasks?.() || [];
        list.innerHTML = '';

        if (tasks.length === 0) {
          list.innerHTML = '<div class="loading-state"><p>No tasks yet. Create your first task!</p></div>';
          return;
        }

        tasks.forEach(task => {
          const item = document.createElement('div');
          item.className = `task-item ${task.status === 'completed' ? 'completed' : ''}`;
          item.dataset.taskId = task.taskId;

          const priorityClass = `task-priority priority-${task.priority || 'medium'}`;
          const deadline = task.deadline ? new Date(task.deadline).toLocaleDateString() : 'No deadline';

          item.innerHTML = `
            <input type="checkbox" class="task-checkbox" ${task.status === 'completed' ? 'checked' : ''} data-task-id="${task.taskId}"/>
            <div class="task-title">${task.title}</div>
            <div class="${priorityClass}">${task.priority || 'medium'}</div>
            <div class="task-deadline">${deadline}</div>
            <button class="btn btn-small btn-danger delete-task" data-task-id="${task.taskId}">Delete</button>
          `;

          // Checkbox completion
          item.querySelector('.task-checkbox').addEventListener('change', (e) => {
            if (e.target.checked) {
              TaskEngine?.completeTask?.(task.taskId);
            }
          });

          // Delete button
          item.querySelector('.delete-task').addEventListener('click', () => {
            if (confirm('Delete this task?')) {
              TaskEngine?.deleteTask?.(task.taskId);
            }
          });

          list.appendChild(item);
        });
      }

      // Event listeners
      EventBus.on('TASK_CREATED', () => {
        renderTaskList();
        updateTaskSummary();
      });

      EventBus.on('TASK_UPDATED', () => {
        renderTaskList();
        updateTaskSummary();
      });

      EventBus.on('TASK_COMPLETED', () => {
        renderTaskList();
        updateTaskSummary();
        updateStreakDisplay();
      });

      EventBus.on('TASK_DELETED', () => {
        renderTaskList();
        updateTaskSummary();
      });

      EventBus.on('STREAK_UPDATED', updateStreakDisplay);

      // Create task button
      document.getElementById("create-task-btn")?.addEventListener("click", () => {
        ModalsUI?.open?.('addTask');
      });

      // Initial render
      updateTaskSummary();
      updateStreakDisplay();
      renderTaskList();

      // Hide loading when data ready
      EventBus.on("BOOT_COMPLETE", () => {
        document.querySelector(".loading-state")?.remove();
      });
    });
  </script>

</body>
</html>
