<!DOCTYPE html>
<html lang="en" data-theme="default">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Analytics Dashboard – Adaptive Life OS"/>
  <title>Analytics – Adaptive Life OS</title>

  <!-- Favicon & Meta -->
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon"/>
  <meta name="theme-color" content="#0f172a"/>

  <!-- CSS Loading Order – Critical: Do NOT change -->
  <link rel="stylesheet" href="assets/css/01-variables.css"/>
  <link rel="stylesheet" href="assets/css/02-base.css"/>
  <link rel="stylesheet" href="assets/css/03-layout.css"/>
  <link rel="stylesheet" href="assets/css/04-components.css"/>
  <link rel="stylesheet" href="assets/css/05-animations.css"/>
  <link rel="stylesheet" href="assets/css/06-responsive.css"/>
  <link rel="stylesheet" href="assets/css/07-themes.css"/>

  <style>
    /* Minimal inline critical CSS for fast paint */
    body {
      margin: 0;
      font-family: var(--bt-font-family-primary);
      background: var(--bt-color-bg-main);
      color: var(--bt-color-text-primary);
      min-height: 100vh;
    }
    .analytics-container {
      max-width: var(--bt-container-max);
      margin: 0 auto;
      padding: var(--bt-space-xl);
    }
    .analytics-header {
      text-align: center;
      margin-bottom: var(--bt-space-2xl);
    }
    .analytics-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: var(--bt-space-lg);
      margin-bottom: var(--bt-space-2xl);
    }
    .metric-card {
      background: var(--bt-color-bg-card);
      border-radius: var(--bt-radius-lg);
      padding: var(--bt-space-xl);
      text-align: center;
      border: 1px solid var(--bt-color-border);
      box-shadow: var(--bt-shadow-md);
    }
    .metric-value {
      font-size: var(--bt-font-size-4xl);
      font-weight: var(--bt-font-weight-bold);
      margin: var(--bt-space-sm) 0;
    }
    .metric-label {
      color: var(--bt-color-text-secondary);
      font-size: var(--bt-font-size-lg);
    }
    .analytics-charts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: var(--bt-space-xl);
      margin-bottom: var(--bt-space-2xl);
    }
    .chart-wrapper {
      background: var(--bt-color-bg-card);
      border-radius: var(--bt-radius-lg);
      padding: var(--bt-space-lg);
      border: 1px solid var(--bt-color-border);
      box-shadow: var(--bt-shadow-md);
      height: 400px;
    }
    .analytics-insights {
      background: var(--bt-color-bg-card);
      border-radius: var(--bt-radius-lg);
      padding: var(--bt-space-xl);
      margin-bottom: var(--bt-space-2xl);
    }
    .insight-card {
      margin-bottom: var(--bt-space-lg);
    }
    .loading-state {
      text-align: center;
      padding: var(--bt-space-3xl);
      color: var(--bt-color-text-muted);
    }
  </style>
</head>
<body>

  <!-- Analytics Container -->
  <div class="analytics-container">

    <!-- Header -->
    <header class="analytics-header">
      <h1>Analytics Dashboard</h1>
      <p>Comprehensive view of your life performance metrics</p>
      <p>Life Score: <span id="life-score-display">Loading...</span></p>
    </header>

    <!-- Summary Metrics -->
    <section class="analytics-summary">
      <div class="metric-card">
        <div class="metric-label">Productivity Score</div>
        <div id="productivity-score" class="metric-value">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Discipline Index</div>
        <div id="discipline-score" class="metric-value">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Wealth Index</div>
        <div id="wealth-score" class="metric-value">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Health Score</div>
        <div id="health-score" class="metric-value">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Risk Index</div>
        <div id="risk-score" class="metric-value">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Burnout Index</div>
        <div id="burnout-score" class="metric-value">0</div>
      </div>
    </section>

    <!-- Charts Grid -->
    <section id="analytics-charts" class="analytics-charts">
      <!-- Chart containers populated by charts.ui.js -->
      <div class="chart-wrapper" id="chart-life-score-wrapper">
        <canvas id="chart-life-score"></canvas>
      </div>
      <div class="chart-wrapper" id="chart-discipline-wrapper">
        <canvas id="chart-discipline"></canvas>
      </div>
      <div class="chart-wrapper" id="chart-wealth-wrapper">
        <canvas id="chart-wealth"></canvas>
      </div>
      <div class="chart-wrapper" id="chart-health-wrapper">
        <canvas id="chart-health"></canvas>
      </div>
      <div class="chart-wrapper" id="chart-risk-burnout-wrapper">
        <canvas id="chart-risk-burnout"></canvas>
      </div>
    </section>

    <!-- Insights Panel -->
    <section id="analytics-insights" class="analytics-insights">
      <h2 class="section-title">Key Insights</h2>
      <div id="insights-content">
        <!-- Populated dynamically -->
        <p>Loading insights...</p>
      </div>
    </section>

    <!-- Loading State (shown before data loads) -->
    <div id="analytics-loading" class="loading-state">
      <div class="spinner"></div>
      <p>Loading analytics data...</p>
    </div>

  </div>

  <!-- Modal Root -->
  <div id="modal-root"></div>

  <!-- JavaScript Loading Order – Optimized for analytics page -->
  <!-- Core -->
  <script src="assets/js/core/08-storage.js"></script>
  <script src="assets/js/core/09-state.js"></script>
  <script src="assets/js/core/10-versioning.js"></script>
  <script src="assets/js/core/11-eventbus.js"></script>

  <!-- Intelligence Engines (required for analytics data) -->
  <script src="assets/js/engine/24-score.engine.js"></script>
  <script src="assets/js/engine/25-discipline.engine.js"></script>
  <script src="assets/js/engine/26-wealth.engine.js"></script>
  <script src="assets/js/engine/27-risk.engine.js"></script>
  <script src="assets/js/engine/28-burnout.engine.js"></script>
  <script src="assets/js/engine/29-rank.engine.js"></script>

  <!-- Charts UI (core requirement) -->
  <script src="assets/js/ui/40-charts.ui.js"></script>

  <!-- Boot (full system init) -->
  <script src="assets/js/core/43-boot.js"></script>

  <!-- Analytics-specific script -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      // Hide loading state when data is ready
      EventBus.on("BOOT_COMPLETE", () => {
        document.getElementById("analytics-loading").style.display = "none";
      });

      // Update summary metrics
      function updateSummary() {
        const scores = ScoreEngine?.getScores() || {};
        document.getElementById("life-score-display").textContent = scores.lifeScore || 0;

        const disc = DisciplineEngine?.getDisciplineMetrics?.() || {};
        document.getElementById("discipline-score").textContent = disc.disciplineIndex || 0;

        const wealth = WealthEngine?.getWealthMetrics?.() || {};
        document.getElementById("wealth-score").textContent = wealth.wealthIndex || 0;

        const risk = RiskEngine?.getRiskMetrics?.() || {};
        document.getElementById("risk-score").textContent = risk.riskIndex || 0;

        const burnout = BurnoutEngine?.getBurnoutMetrics?.() || {};
        document.getElementById("burnout-score").textContent = burnout.burnoutIndex || 0;
      }

      // Listen for score updates
      EventBus.on("SCORE_UPDATED", updateSummary);
      EventBus.on("DISCIPLINE_UPDATED", updateSummary);
      EventBus.on("WEALTH_UPDATED", updateSummary);
      EventBus.on("RISK_UPDATED", updateSummary);
      EventBus.on("BURNOUT_UPDATED", updateSummary);

      // Initial update
      updateSummary();

      // Insights generation (simple example)
      function updateInsights() {
        const insights = document.getElementById("insights-content");
        if (!insights) return;

        const rank = RankEngine?.getCurrentRank?.()?.name || 'Beginner';
        const disc = DisciplineEngine?.getDisciplineMetrics?.()?.disciplineIndex || 0;
        const wealthIdx = WealthEngine?.getWealthMetrics?.()?.wealthIndex || 0;

        insights.innerHTML = `
          <div class="insight-card">
            <h3>Current Status</h3>
            <p>You are currently ranked as <strong>${rank}</strong>.</p>
            <p>Discipline Index: <strong>${disc}</strong></p>
            <p>Wealth Index: <strong>${wealthIdx}</strong></p>
          </div>
          <!-- Add more dynamic insights -->
        `;
      }

      EventBus.on("RANK_UPDATED", updateInsights);
      EventBus.on("DISCIPLINE_UPDATED", updateInsights);
      EventBus.on("WEALTH_UPDATED", updateInsights);

      updateInsights();
    });
  </script>

</body>
</html>
