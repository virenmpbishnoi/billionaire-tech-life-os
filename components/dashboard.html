<div class="dashboard-container">

  <section class="dashboard-overview">

    <div class="metric-card">
      <h3>Life Score</h3>
      <div id="lifeScore">0</div>
    </div>

    <div class="metric-card">
      <h3>Discipline</h3>
      <div id="disciplineScore">0</div>
    </div>

    <div class="metric-card">
      <h3>Wealth</h3>
      <div id="wealthScore">0</div>
    </div>

    <div class="metric-card">
      <h3>Health</h3>
      <div id="healthScore">0</div>
    </div>

  </section>


  <section class="dashboard-analytics">

    <div class="chart-box">
      <canvas id="performanceChart"></canvas>
    </div>

    <div class="chart-box">
      <canvas id="habitChart"></canvas>
    </div>

  </section>


  <section class="dashboard-thoughts">

    <h2>Strategic Thoughts</h2>

    <textarea id="thoughtInput"
      placeholder="Write strategic insights...">
    </textarea>

  </section>

</div>
